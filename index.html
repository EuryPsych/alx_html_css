<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmileSchool</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <div class="logo-container">
            <a href="#" class="logo">
                <img src="assets/images/logo.png" alt="SmileSchool Logo">
            </a>
        </div>
        <nav class="main-nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="#">COURSES</a></li>
                <li class="nav-item"><a href="#">PRICING</a></li>
                <li class="nav-item"><a href="#">LOGIN</a></li>
            </ul>
        </nav>
    </header>

    <!-- Banner Section -->
    <section class="banner">
        <div class="banner-content">
            <h1 class="banner-title">Get schooled</h1>
            <div class="banner-tags">
                <span>SMILES</span>
                <span>GRIN</span>
                <span>LAUGH</span>
            </div>
            <button class="cta-button">REGISTER FOR FREE</button>
        </div>

        <div class="pros-section">
            <h2 class="pros-title"><span>Learn</span> from the pros</h2>
            <div class="pros-grid">
                <div class="pro-card">
                    <img src="assets/images/phillip.png" alt="Phillip Massey">
                    <h3>Phillip Massey</h3>
                    <p>Smile of the year</p>
                </div>
                <div class="pro-card">
                    <img src="assets/images/nannie.png" alt="Nannie Lawrence">
                    <h3>Nannie Lawrence</h3>
                    <p>Best little smile</p>
                </div>
                <div class="pro-card">
                    <img src="assets/images/bruce.png" alt="Bruce Walters">
                    <h3>Bruce Walters</h3>
                    <p>Best Friend Smile</p>
                </div>
                <div class="pro-card">
                    <img src="assets/images/henry.png" alt="Henry Hughes">
                    <h3>Henry Hughes</h3>
                    <p>24h smiles winner</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
